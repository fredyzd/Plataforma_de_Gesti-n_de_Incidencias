# ── Cabeceras de seguridad ─────────────────────────────────
add_header X-Frame-Options           "SAMEORIGIN"           always;
add_header X-Content-Type-Options    "nosniff"              always;
add_header X-XSS-Protection          "1; mode=block"        always;
add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
add_header Content-Security-Policy
    "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:; font-src 'self'; frame-ancestors 'none';"
    always;

# ── Frontend (SPA) ─────────────────────────────────────────
root /usr/share/nginx/html;
index index.html;

location / {
    try_files $uri $uri/ /index.html;
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
}

# Assets estáticos con caché larga
location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# ── API proxy ──────────────────────────────────────────────
location /api/ {
    limit_req zone=api_general burst=20 nodelay;

    proxy_pass         http://backend/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Connection        "";
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
}

# Auth endpoints — rate limit más estricto
location ~ ^/api/auth/(login|refresh|forgot-password) {
    limit_req zone=api_auth burst=5 nodelay;

    proxy_pass         http://backend$request_uri;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

# WebSocket (Socket.io)
location /socket.io/ {
    proxy_pass         http://backend/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_read_timeout 3600s;
}

# Bloquear acceso directo a archivos sensibles
location ~ /\. {
    deny all;
}
location ~ \.(env|example|sh|sql|bak|log)$ {
    deny all;
}
