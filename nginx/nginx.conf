# ============================================================
# PGI — Nginx hardened config
# Versión: QAS (HTTP) y Producción (HTTPS)
# ============================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    gzip                on;
    gzip_types          text/plain text/css application/json application/javascript
                        text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length     1024;

    # ── Seguridad global ─────────────────────────────────────
    server_tokens       off;              # No revelar versión de Nginx
    client_max_body_size 15M;             # Límite de upload (> MAX_FILE_SIZE_MB)
    client_body_timeout  15s;
    client_header_timeout 15s;

    # ── Rate limiting ─────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
    limit_req_status 429;

    # ── Upstream ─────────────────────────────────────────────
    upstream backend {
        server backend:3001;
        keepalive 32;
    }

    # ── Servidor QAS (HTTP) ───────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Redirigir a HTTPS en producción — descomentar cuando haya certificado:
        # return 301 https://$host$request_uri;

        include /etc/nginx/conf.d/common.conf;
    }

    # ── Servidor Producción (HTTPS) ───────────────────────────
    # Descomentar y completar rutas de certificado para producción:
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name pgi.tudominio.com;
    #
    #     ssl_certificate     /etc/ssl/certs/pgi.crt;
    #     ssl_certificate_key /etc/ssl/private/pgi.key;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:...;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_stapling        on;
    #     ssl_stapling_verify on;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     include /etc/nginx/conf.d/common.conf;
    # }
}
